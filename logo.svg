<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c842;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4941a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e63030;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9a1a1a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#080a0f"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="242" fill="none" stroke="url(#goldGrad)" stroke-width="3" opacity="0.6"/>
  <circle cx="256" cy="256" r="234" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.3"/>

  <!-- Heart shape (red, center-back) -->
  <path d="M256 340 C256 340 156 280 156 210 C156 178 178 158 210 158 C228 158 244 168 256 182 C268 168 284 158 302 158 C334 158 356 178 356 210 C356 280 256 340 256 340Z"
    fill="url(#redGrad)" opacity="0.85"/>

  <!-- H letter - left -->
  <rect x="148" y="175" width="28" height="110" rx="4" fill="url(#goldGrad)" filter="url(#glow)"/>
  <rect x="148" y="220" width="72" height="26" rx="4" fill="url(#goldGrad)" filter="url(#glow)"/>
  <rect x="192" y="175" width="28" height="110" rx="4" fill="url(#goldGrad)" filter="url(#glow)"/>

  <!-- Ampersand / divider line -->
  <rect x="244" y="185" width="3" height="90" rx="1.5" fill="#e8c840" opacity="0.5"/>

  <!-- H letter - right -->
  <rect x="256" y="175" width="28" height="110" rx="4" fill="url(#goldGrad)" filter="url(#glow)"/>
  <rect x="256" y="220" width="72" height="26" rx="4" fill="url(#goldGrad)" filter="url(#glow)"/>
  <rect x="300" y="175" width="28" height="110" rx="4" fill="url(#goldGrad)" filter="url(#glow)"/>

  <!-- Flame tip (top of heart peeking as flame) -->
  <path d="M256 155 C252 145 244 138 244 128 C244 118 252 112 256 118 C260 112 268 118 268 128 C268 138 260 145 256 155Z"
    fill="url(#redGrad)" filter="url(#glow)"/>

  <!-- Bottom text: HUSTLE & HEART -->
  <text x="256" y="400" text-anchor="middle"
    font-family="Georgia, serif"
    font-size="28"
    font-weight="bold"
    letter-spacing="6"
    fill="url(#goldGrad)"
    filter="url(#glow)">HUSTLE</text>

  <text x="256" y="432" text-anchor="middle"
    font-family="Georgia, serif"
    font-size="16"
    letter-spacing="10"
    fill="#e8c840"
    opacity="0.7">&amp; HEART</text>

  <!-- Corner accent marks -->
  <line x1="80" y1="256" x2="100" y2="256" stroke="#e8c840" stroke-width="2" opacity="0.4"/>
  <line x1="412" y1="256" x2="432" y2="256" stroke="#e8c840" stroke-width="2" opacity="0.4"/>
</svg>