const START_DATE = new Date("2026-06-09"); // Monday June 9
const TRAINING_DAYS_OF_WEEK = [1,2,4,5]; // Mon,Tue,Thu,Fri

// Auto-calculate current week from start date
const calcCurrentWeek = () => {
  const now = new Date();
  const diff = Math.floor((now - START_DATE) / (1000*60*60*24*7));
  return Math.max(1, Math.min(12, diff + 1));
};

// Phase from week (auto-gate)
const phaseFromWeek = (w) => {
  if (w <= 4) return 0;
  if (w <= 8) return 1;
  return 2;
};

// Deload every 4th week
const isDeload = (w) => w % 4 === 0;

// 1RM calculator (Epley formula)
const calc1RM = (weight, reps) => {
  if (!weight || !reps || reps <= 0) return 0;
  return Math.round(parseFloat(weight) * (1 + parseInt(reps) / 30));
};

// Volume calculator
const calcVolume = (sets) => {
  return sets.filter(s=>!s.isWarmup).reduce((sum,s) => {
    return sum + (parseFloat(s.w)||0) * (parseInt(s.r)||0);
  }, 0);
};

// Progressive overload engine
const isCompound = n => /squat|deadlift|bench|press|row|pull.up|thrust|lunge|dip/i.test(n);
const isLowerBody = n => /squat|deadlift|thrust|lunge|leg|calf|tibialis/i.test(n);

const calcTarget = (lastSets, ex, week, phase) => {
  if (!lastSets || lastSets.length === 0 || week <= 1) return null;
  const workSets = lastSets.filter(s => !s.isWarmup && !s.isBurnout);
  if (!workSets.length) return null;
  const lower = isLowerBody(ex.n);
  const weightInc = ex.nw ? 0 : lower ? 10 : isCompound(ex.n) ? 5 : 2.5;
  const allHit = workSets.every(s => {
    const reps = parseInt(s.r)||0;
    const rir  = parseInt(s.rir);
    const tgt  = typeof ex.r==="number" ? ex.r : parseInt(ex.r)||10;
    return reps >= tgt && (isNaN(rir) || rir <= 1);
  });
  const lastW = parseFloat(workSets[0]?.w)||0;
  const tgtR  = typeof ex.r==="number" ? ex.r : parseInt(ex.r)||10;
  const nextW = allHit ? lastW + weightInc : lastW;
  if (phase===2) {
    return Array.from({length:ex.s},(_,i)=>({
      w: Math.max(0, nextW-(i*(lower?10:5))).toString(),
      r: i===ex.s-1?"FAILURE":tgtR.toString(),
      isBurnout: i===ex.s-1,
    }));
  }
  return Array.from({length:ex.s},(_,i)=>({
    w: nextW.toString(),
    r: i===ex.s-1&&phase>=1?"BURNOUT":tgtR.toString(),
    isBurnout: i===ex.s-1&&phase>=1,
  }));
};

// Warm-up sets generator
const calcWarmups = (workWeight, ex) => {
  if (!workWeight || ex.nw || parseFloat(workWeight) < 45) return [];
  const w = parseFloat(workWeight);
  if (!isCompound(ex.n)) return [];
  return [
    {w: Math.round(w*0.4).toString(), r:"10", isWarmup:true, label:"Warm-up 1"},
    {w: Math.round(w*0.6).toString(), r:"6",  isWarmup:true, label:"Warm-up 2"},
    {w: Math.round(w*0.8).toString(), r:"3",  isWarmup:true, label:"Warm-up 3"},
  ];
};

// ── REST TIMER ─────────────────────────────────────────────────────────────
const RestTimer=({onClose})=>{
  const [secs,setSecs]=useState(90);
  const [run,setRun]=useState(false);
  const [init,setInit]=useState(90);
  const ref=useRef(null);
  useEffect(()=>{
    if(run){ref.current=setInterval(()=>setSecs(s=>{if(s<=1){clearInterval(ref.current);setRun(false);return 0;}return s-1;}),1000);}
    else clearInterval(ref.current);
    return()=>clearInterval(ref.current);
  },[run]);
  const r=54,ci=2*Math.PI*r,pct=secs/init;
  return(
    <div style={{position:"fixed",inset:0,zIndex:300,display:"flex",alignItems:"flex-end",background:"rgba(0,0,0,0.9)"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{width:"100%",maxWidth:430,margin:"0 auto",background:C.card,borderRadius:"16px 16px 0 0",padding:"28px 20px 48px",borderBottom:"none",textAlign:"center"}}>
        <p style={{margin:"0 0 20px",fontSize:11,color:C.muted,letterSpacing:"0.25em",textTransform:"uppercase",fontFamily:FC}}>REST TIMER</p>
        <svg width="130" height="130" viewBox="0 0 130 130" style={{display:"block",margin:"0 auto 20px"}}>
          <circle cx="65" cy="65" r={r} fill="none" stroke={C.border} strokeWidth="6"/>
          <circle cx="65" cy="65" r={r} fill="none" stroke={C.yellow} strokeWidth="6"
            strokeDasharray={ci} strokeDashoffset={ci*(1-pct)} strokeLinecap="round"
            transform="rotate(-90 65 65)" style={{transition:"stroke-dashoffset 1s linear"}}/>
          <text x="65" y="70" textAnchor="middle" fill={C.text} fontSize="28" fontFamily={FC} fontWeight="bold">
            {Math.floor(secs/60)}:{String(secs%60).padStart(2,"0")}
          </text>
        </svg>
        <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:20}}>
          {[60,90,120,180].map(p=>(<button key={p} onClick={()=>{setSecs(p);setInit(p);setRun(false);}}
            style={{background:init===p?C.yellow:C.surface,color:init===p?"#000":C.steel,border:`1px solid ${init===p?C.yellow:C.border}`,borderRadius:8,padding:"8px 12px",fontSize:13,cursor:"pointer",fontFamily:FC}}>{p}s</button>))}
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>setRun(!run)} style={{flex:1,background:run?C.redDim:C.yellow,color:run?C.text:"#000",border:"none",borderRadius:10,padding:"14px",fontSize:15,fontWeight:"bold",cursor:"pointer",fontFamily:FC,letterSpacing:"0.1em"}}>
            {run?"PAUSE":"START"}
          </button>
          <button onClick={()=>{setSecs(init);setRun(false);}} style={{background:C.surface,color:C.steel,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 16px",fontSize:13,cursor:"pointer"}}>RESET</button>
        </div>
      </div>
    </div>
  );
};

// ── INLINE TIMER ───────────────────────────────────────────────────────────
const InlineTimer=({seconds,label,onDone})=>{
  const [secs,setSecs]=useState(seconds);
  const [done,setDone]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    ref.current=setInterval(()=>setSecs(s=>{if(s<=1){clearInterval(ref.current);setDone(true);onDone&&onDone();return 0;}return s-1;}),1000);
    return()=>clearInterval(ref.current);
  },[]);
  const pct=secs/seconds;
  const col=done?C.green:secs<30?C.red:C.yellow;
  return(
    <div style={{background:C.surface,borderRadius:10,padding:"10px 14px",marginTop:8,display:"flex",alignItems:"center",gap:12,border:`1px solid ${col}44`}}>
      <div style={{width:40,height:40,flexShrink:0,position:"relative",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <svg width="40" height="40" viewBox="0 0 40 40" style={{position:"absolute"}}>
          <circle cx="20" cy="20" r="17" fill="none" stroke={C.border} strokeWidth="3"/>
          <circle cx="20" cy="20" r="17" fill="none" stroke={col} strokeWidth="3"
            strokeDasharray="106.8" strokeDashoffset={106.8*(1-pct)} strokeLinecap="round"
            transform="rotate(-90 20 20)" style={{transition:"stroke-dashoffset 1s linear"}}/>
        </svg>
        <span style={{fontSize:9,fontWeight:"bold",fontFamily:FC,color:col,position:"relative",zIndex:1,textAlign:"center"}}>
          {done?"GO":secs>=60?`${Math.floor(secs/60)}:${String(secs%60).padStart(2,"0")}`:secs}
        </span>
      </div>
      <div>
        <p style={{margin:0,fontSize:12,fontWeight:"bold",fontFamily:FC,color:done?C.green:C.text}}>{done?"REST DONE - NEXT SET!":(label||"REST")}</p>
        <p style={{margin:0,fontSize:10,color:C.muted,fontFamily:FB}}>{done?"Go when ready":secs<30?"Almost time...":"Recover fully"}</p>
      </div>
    </div>
  );
};

                {section.supps.map((s,i)=>(<span key={i} style={{fontSize:10,padding:"3px 9px",borderRadius:12,background:C.green+"22",color:C.greenBright,border:`1px solid ${C.green}44`,fontFamily:FC}}>{s}</span>))}
              </div>
            </div>
          )}
          <p style={{margin:0,fontSize:11,color:C.muted,fontStyle:"italic",fontFamily:FB,lineHeight:1.5}}>{section.note}</p>
        </div>
      )}
    </div>
  );
};

// ── SUPP CARD ──────────────────────────────────────────────────────────────

          <div style={{background:C.surface,borderRadius:8,padding:"8px 10px",marginTop:8}}>

// ── LOG MODAL (Full Progressive Overload) ─────────────────────────────────
const LogModal=({ex,pc,lastSets,targets,week,phase,allHistory,onSave,onClose})=>{
  const baseline=!week||week<=1;
  const compound=isCompound(ex.n);
  const restSecs=compound?150:60;
  const workSets=(lastSets||[]).filter(s=>!s.isWarmup&&!s.isBurnout);
  const lastWeight=parseFloat(workSets[0]?.w)||0;
  const suggestedWarmups=lastWeight>0?calcWarmups(lastWeight.toString(),ex):[];
  const initSets=workSets.length>0
    ?workSets.map(s=>({...s,rir:s.rir||"",logged:false}))
    :Array.from({length:ex.s},()=>({r:"",w:"",rir:"",logged:false}));
  const [sets,setSets]=useState(initSets);
  const [warmupIdx,setWarmupIdx]=useState(0);
  const [warmupsLogged,setWarmupsLogged]=useState(false);
  const [activeSet,setActiveSet]=useState(0);
  const [restTimer,setRestTimer]=useState(null);
  const [timerKey,setTimerKey]=useState(0);
  const [burnoutReady,setBurnoutReady]=useState(false);
  const [showBurnout,setShowBurnout]=useState(false);
  const [burnout,setBurnout]=useState({w:"",r:"",rir:""});
  const [sessionNote,setSessionNote]=useState("");
  const [showHistory,setShowHistory]=useState(false);
  const [showWarmups,setShowWarmups]=useState(compound&&!ex.nw);

  const upd=(i,f,v)=>setSets(p=>p.map((s,idx)=>idx===i?{...s,[f]:v}:s));
  const updB=(f,v)=>setBurnout(b=>({...b,[f]:v}));

  const logSet=(i)=>{
    setSets(p=>p.map((s,idx)=>idx===i?{...s,logged:true}:s));
    const isLast=i===sets.length-1;
    const label=compound?"2.5 MIN REST":"60s REST";
    if(isLast&&phase>=1){
      setRestTimer({secs:180,label:"BURNOUT REST - 3 MIN"});
      setTimerKey(k=>k+1);
    } else {
      setRestTimer({secs:restSecs,label});
      setTimerKey(k=>k+1);
      setActiveSet(Math.min(i+1,sets.length-1));
    }
    if(isLast&&phase>=1){
      setTimeout(()=>setBurnoutReady(true),180000);
    }
  };

  const getStatus=(i)=>{
    if(baseline||!targets||!targets[i]) return "base";
    const s=sets[i];if(!s.logged)return "base";
    const tW=parseFloat(targets[i]?.w)||0,tR=parseInt(targets[i]?.r)||0;
    const aW=parseFloat(s.w)||0,aR=parseInt(s.r)||0;
    if(aW>=tW&&aR>=tR)return "hit";
    if(aW>=tW*0.95&&aR>=tR-1)return "close";
    return "miss";
  };
  const SC={hit:C.green,close:C.yellow,miss:C.red,base:C.border};
  const SL={hit:"HIT",close:"CLOSE",miss:"MISSED",base:""};

  const est1RM=()=>{
    const topSet=sets.filter(s=>s.logged&&!s.isBurnout&&s.w&&s.r).sort((a,b)=>parseFloat(b.w)-parseFloat(a.w))[0];
    if(!topSet)return null;
    return calc1RM(topSet.w,topSet.r);
  };

  const vol=calcVolume(sets.filter(s=>s.logged));
  const prev1RM=allHistory&&allHistory.length>0?allHistory.reduce((best,wk)=>{
    const top=(wk||[]).filter(s=>!s.isWarmup&&!s.isBurnout&&s.w&&s.r).sort((a,b)=>parseFloat(b.w)-parseFloat(a.w))[0];
    const rm=top?calc1RM(top.w,top.r):0;
    return rm>best?rm:best;
  },0):0;
  const current1RM=est1RM();
  const isPR=current1RM&&prev1RM&&current1RM>prev1RM;

  return(
    <div style={{position:"fixed",inset:0,zIndex:200,display:"flex",alignItems:"flex-end",background:"rgba(0,0,0,0.92)"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{width:"100%",maxWidth:430,margin:"0 auto",background:C.card,borderRadius:"16px 16px 0 0",padding:"20px 16px 40px",borderBottom:"none",maxHeight:"92vh",overflowY:"auto"}}>

        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
          <div style={{flex:1,paddingRight:8}}>
            <p style={{margin:0,fontSize:10,color:pc,letterSpacing:"0.2em",textTransform:"uppercase",fontFamily:FC}}>
              {baseline?"WEEK 1 - SET BASELINE":"WEEK "+(week||1)+" TARGETS"}
            </p>
            <p style={{margin:"2px 0 4px",fontSize:17,fontWeight:"bold",fontFamily:FC}}>{ex.n}</p>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              <span style={{fontSize:9,padding:"2px 8px",borderRadius:4,background:pc+"22",color:pc,fontFamily:FC}}>
                {ex.s} sets x {ex.r}{typeof ex.r==="number"?" reps":""}
              </span>
              <span style={{fontSize:9,padding:"2px 8px",borderRadius:4,background:C.surface,color:C.muted,fontFamily:FC}}>
                {compound?"Compound 2.5min":"Isolation 60s"}
              </span>
              {phase>=1&&<span style={{fontSize:9,padding:"2px 8px",borderRadius:4,background:C.red+"22",color:C.red,fontFamily:FC}}>BURNOUT</span>}
            </div>
          </div>
          <div style={{display:"flex",gap:6,flexShrink:0}}>
            {allHistory&&allHistory.length>0&&(
              <button onClick={()=>setShowHistory(!showHistory)} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 8px",cursor:"pointer",fontSize:9,color:C.steel,fontFamily:FC}}>
                HISTORY
              </button>
            )}
            <button onClick={onClose} style={{background:"transparent",border:"none",cursor:"pointer",padding:4}}>
              <Ic n="x" sz={22} col={C.steel}/>
            </button>
          </div>
        </div>

        {/* Exercise history */}
        {showHistory&&allHistory&&(
          <div style={{background:C.surface,borderRadius:10,padding:"12px 14px",marginBottom:12,border:`1px solid ${C.border}`}}>
            <p style={{margin:"0 0 8px",fontSize:11,color:C.yellow,fontFamily:FC,letterSpacing:"0.1em",textTransform:"uppercase"}}>Exercise History</p>
            {allHistory.map((wkSets,i)=>{
              const ws=(wkSets||[]).filter(s=>!s.isWarmup&&!s.isBurnout);
              const rm=ws[0]?calc1RM(ws[0].w,ws[0].r):0;
              const v=calcVolume(ws);
              return(
                <div key={i} style={{marginBottom:6,paddingBottom:6,borderBottom:i<allHistory.length-1?`1px solid ${C.border}22`:"none"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                    <span style={{fontSize:11,fontFamily:FC,color:C.muted}}>Week {i+1}</span>
                    <div style={{display:"flex",gap:8}}>
                      {rm>0&&<span style={{fontSize:10,fontFamily:FC,color:C.yellow}}>~1RM: {rm}lb</span>}
                      {v>0&&<span style={{fontSize:10,fontFamily:FC,color:C.steel}}>{Math.round(v).toLocaleString()}lb vol</span>}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                    {ws.map((s,j)=>(
                      <span key={j} style={{fontSize:9,padding:"2px 7px",borderRadius:5,background:C.card,color:C.steel,fontFamily:FC}}>
                        {s.w?`${s.w}lb`:"BW"} x {s.r}{s.rir!==undefined&&s.rir!==""?` RIR${s.rir}`:""}
                      </span>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* Baseline notice */}
        {baseline&&(
          <div style={{background:C.yellow+"22",borderRadius:8,padding:"9px 12px",marginBottom:12,border:`1px solid ${C.yellow}44`}}>
            <p style={{margin:0,fontSize:11,color:C.yellow,fontFamily:FB,lineHeight:1.5}}>
              Week 1 - Log your real working weights. Week 2+ calculates targets automatically. Hit all reps + RIR 0-1 = weight goes up. Miss reps = same weight repeated.
            </p>
          </div>
        )}

        {/* Warm-up sets */}
        {showWarmups&&suggestedWarmups.length>0&&!warmupsLogged&&(
          <div style={{background:C.surface,borderRadius:10,padding:"12px 14px",marginBottom:12,border:`1px solid ${C.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <p style={{margin:0,fontSize:11,fontFamily:FC,color:C.steel,letterSpacing:"0.1em",textTransform:"uppercase"}}>Warm-Up Sets</p>
              <button onClick={()=>setShowWarmups(false)} style={{background:"none",border:"none",cursor:"pointer",fontSize:10,color:C.muted,fontFamily:FC}}>SKIP</button>
            </div>
            {suggestedWarmups.map((wu,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 0",borderBottom:i<suggestedWarmups.length-1?`1px solid ${C.border}33`:"none"}}>
                <span style={{fontSize:11,color:C.muted,fontFamily:FC}}>{wu.label}</span>
                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                  <span style={{fontSize:13,fontWeight:"bold",fontFamily:FC,color:C.steel}}>{wu.w}lb x {wu.r}</span>
                  {i===warmupIdx&&(
                    <button onClick={()=>{if(i===suggestedWarmups.length-1)setWarmupsLogged(true);else setWarmupIdx(i+1);}}
                      style={{background:C.steel+"33",border:`1px solid ${C.steel}44`,borderRadius:6,padding:"4px 10px",fontSize:10,color:C.steel,cursor:"pointer",fontFamily:FC}}>
                      DONE
                    </button>
                  )}
                  {i<warmupIdx&&<span style={{fontSize:10,color:C.green,fontFamily:FC}}>done</span>}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* Working sets */}
        {sets.map((s,i)=>{
          const status=getStatus(i);
          const sc=SC[status];
          const target=targets&&targets[i];
          const isActive=i===activeSet&&!s.logged;
          return(
            <div key={i} style={{borderRadius:10,padding:"12px 14px",marginBottom:8,
              background:s.logged?sc+"11":isActive?pc+"11":C.surface,
              border:`1px solid ${s.logged?sc+"66":isActive?pc+"44":C.border}`,
              transition:"all 0.3s"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:11,fontFamily:FC,fontWeight:700,color:isActive?pc:C.muted,letterSpacing:"0.1em"}}>SET {i+1}</span>
                  {isActive&&!s.logged&&<span style={{fontSize:9,padding:"2px 7px",borderRadius:4,background:pc,color:"#000",fontFamily:FC,fontWeight:700}}>ACTIVE</span>}
                  {s.logged&&status!=="base"&&<span style={{fontSize:9,padding:"2px 7px",borderRadius:4,background:sc+"22",color:sc,fontFamily:FC}}>{SL[status]}</span>}
                </div>
                {target&&!baseline&&(
                  <span style={{fontSize:10,color:C.muted,fontFamily:FC}}>
                    Target: {target.isBurnout?"BURNOUT":target.w+"lb x "+target.r}
                  </span>
                )}
              </div>
              <div style={{display:"flex",gap:8}}>
                {!ex.nw&&(
                  <div style={{flex:1}}>
                    <p style={{margin:"0 0 4px",fontSize:9,color:C.muted,fontFamily:FC,letterSpacing:"0.1em"}}>WEIGHT (lbs)</p>
                    <input value={s.w} onChange={e=>upd(i,"w",e.target.value)}
                      placeholder={target&&!baseline?target.w:"0"} type="number"
                      style={{width:"100%",background:C.bg,border:`1px solid ${isActive?pc+"88":C.border}`,borderRadius:8,padding:"10px",color:C.text,fontSize:20,fontFamily:FC,outline:"none",textAlign:"center",fontWeight:"bold"}}/>
                  </div>
                )}
                <div style={{flex:1}}>
                  <p style={{margin:"0 0 4px",fontSize:9,color:C.muted,fontFamily:FC,letterSpacing:"0.1em"}}>REPS</p>
                  <input value={s.r} onChange={e=>upd(i,"r",e.target.value)}
                    placeholder={target&&!baseline?target.r:typeof ex.r==="number"?String(ex.r):ex.r||"0"}
                    style={{width:"100%",background:C.bg,border:`1px solid ${isActive?pc+"88":C.border}`,borderRadius:8,padding:"10px",color:C.text,fontSize:20,fontFamily:FC,outline:"none",textAlign:"center",fontWeight:"bold"}}/>
                </div>
              </div>
              <RIRSelect value={s.rir} onChange={v=>upd(i,"rir",v)}/>
              {!s.logged&&(
                <button onClick={()=>logSet(i)}
                  style={{width:"100%",marginTop:10,background:isActive?pc:C.surface,color:isActive?"#000":C.muted,border:`1px solid ${isActive?pc:C.border}`,borderRadius:8,padding:"11px",fontSize:12,fontWeight:"bold",cursor:"pointer",fontFamily:FC,letterSpacing:"0.1em",textTransform:"uppercase"}}>
                  LOG SET {i+1}
                </button>
              )}
            </div>
          );
        })}

        {/* Live 1RM + Volume */}
        {sets.some(s=>s.logged&&s.w&&s.r)&&(
          <div style={{background:C.surface,borderRadius:10,padding:"10px 14px",marginBottom:8,display:"flex",gap:12,border:`1px solid ${C.border}`}}>
            {current1RM&&(
              <div style={{flex:1,textAlign:"center"}}>
                <p style={{margin:0,fontSize:9,color:C.muted,fontFamily:FC,letterSpacing:"0.1em"}}>EST 1RM</p>
                <p style={{margin:0,fontSize:18,fontWeight:"bold",fontFamily:FD,color:isPR?C.yellow:C.text}}>
                  {current1RM}lb {isPR&&"PR!"}
                </p>
                {isPR&&<p style={{margin:0,fontSize:9,color:C.yellow,fontFamily:FC}}>NEW RECORD +{current1RM-prev1RM}lb</p>}
              </div>
            )}
            {vol>0&&(
              <div style={{flex:1,textAlign:"center",borderLeft:`1px solid ${C.border}`,paddingLeft:12}}>
                <p style={{margin:0,fontSize:9,color:C.muted,fontFamily:FC,letterSpacing:"0.1em"}}>SESSION VOLUME</p>
                <p style={{margin:0,fontSize:18,fontWeight:"bold",fontFamily:FD,color:C.steel}}>{Math.round(vol).toLocaleString()}lb</p>
              </div>
            )}
          </div>
        )}

        {/* Rest timer */}
        {restTimer&&<InlineTimer key={timerKey} seconds={restTimer.secs} label={restTimer.label} onDone={()=>{if(phase>=1&&sets.every(s=>s.logged))setBurnoutReady(true);}}/>}

        {/* Burnout section */}
        {phase>=1&&sets.every(s=>s.logged)&&!showBurnout&&(
          <div style={{background:C.red+"22",borderRadius:10,padding:"14px",border:`1px solid ${C.red}66`,marginTop:8}}>
            <p style={{margin:"0 0 4px",fontSize:16,fontFamily:FD,color:C.red}}>BURNOUT SET</p>
            <p style={{margin:"0 0 10px",fontSize:11,color:C.muted,fontFamily:FB,lineHeight:1.5}}>
              {burnoutReady?"REST DONE. Drop 30%. Go to absolute failure. Every last rep.":"Rest 3 min then go to absolute failure. Drop 30% of working weight."}
            </p>
            {burnoutReady&&(
              <button onClick={()=>setShowBurnout(true)}
                style={{width:"100%",background:C.red,color:"#000",border:"none",borderRadius:8,padding:"12px",fontSize:14,fontWeight:"bold",cursor:"pointer",fontFamily:FC,letterSpacing:"0.1em",textTransform:"uppercase"}}>
                LOG BURNOUT SET
              </button>
            )}
          </div>
        )}
        {showBurnout&&(
          <div style={{background:C.red+"22",borderRadius:10,padding:"14px",border:`1px solid ${C.red}`,marginTop:8}}>
            <p style={{margin:"0 0 10px",fontSize:16,fontFamily:FD,color:C.red}}>BURNOUT - ABSOLUTE FAILURE</p>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              {!ex.nw&&(
                <div style={{flex:1}}>
                  <p style={{margin:"0 0 4px",fontSize:9,color:C.red,fontFamily:FC}}>WEIGHT (-30%)</p>
                  <input value={burnout.w} onChange={e=>updB("w",e.target.value)}
                    placeholder={sets[0]?.w?String(Math.round(parseFloat(sets[0].w)*0.7)):""}
                    type="number" style={{width:"100%",background:C.bg,border:`1px solid ${C.red}`,borderRadius:8,padding:"10px",color:C.red,fontSize:20,fontFamily:FC,outline:"none",textAlign:"center",fontWeight:"bold"}}/>
                </div>
              )}
              <div style={{flex:1}}>
                <p style={{margin:"0 0 4px",fontSize:9,color:C.red,fontFamily:FC}}>REPS TO FAILURE</p>
                <input value={burnout.r} onChange={e=>updB("r",e.target.value)}
                  placeholder="MAX" style={{width:"100%",background:C.bg,border:`1px solid ${C.red}`,borderRadius:8,padding:"10px",color:C.red,fontSize:20,fontFamily:FC,outline:"none",textAlign:"center",fontWeight:"bold"}}/>
              </div>
            </div>
            <RIRSelect value={burnout.rir} onChange={v=>updB("rir",v)}/>
            <button onClick={()=>{onSave([...sets,{...burnout,isBurnout:true,logged:true}],sessionNote);}}
              style={{width:"100%",marginTop:12,background:C.red,color:"#000",border:"none",borderRadius:8,padding:"14px",fontSize:15,fontWeight:"bold",cursor:"pointer",fontFamily:FC,letterSpacing:"0.1em",textTransform:"uppercase"}}>
              SAVE + FINISH SESSION
            </button>
          </div>
        )}

        {/* Session note */}
        <div style={{marginTop:10}}>
          <p style={{margin:"0 0 4px",fontSize:9,color:C.muted,fontFamily:FC,letterSpacing:"0.1em",textTransform:"uppercase"}}>Session Notes (optional)</p>
          <input value={sessionNote} onChange={e=>setSessionNote(e.target.value)}
            placeholder="Shoulder felt tight, energy was low, new PR..."
            style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",color:C.text,fontSize:13,fontFamily:FB,outline:"none",boxSizing:"border-box"}}/>
        </div>

        {/* Phase 1 save */}
        {phase===0&&(
          <button onClick={()=>onSave(sets,sessionNote)}
            style={{width:"100%",background:pc,color:"#000",border:"none",borderRadius:10,padding:"14px",fontSize:15,fontWeight:"bold",cursor:"pointer",fontFamily:FC,letterSpacing:"0.1em",marginTop:12,textTransform:"uppercase"}}>
            SAVE ALL SETS
          </button>
        )}
      </div>
    </div>
  );
};

// ── SESSION COMPLETE MODAL ─────────────────────────────────────────────────
const SessionComplete=({wo,data,ph,di,week,onClose})=>{
  const exercises=wo.ex;
  const totalVol=exercises.reduce((sum,ex,i)=>{
    const sets=(data[`p${ph}_d${di}_e${i}_w${week}`]||[]).filter(s=>!s.isWarmup);
    return sum+calcVolume(sets);
  },0);
  const PRs=exercises.reduce((acc,ex,i)=>{
    const sets=(data[`p${ph}_d${di}_e${i}_w${week}`]||[]).filter(s=>!s.isWarmup&&!s.isBurnout);
    const top=sets.sort((a,b)=>parseFloat(b.w)-parseFloat(a.w))[0];
    if(!top||!top.w||!top.r)return acc;
    const rm=calc1RM(top.w,top.r);
    const hist=Array.from({length:week-1},(_,w)=>data[`p${ph}_d${di}_e${i}_w${w+1}`]||[]);
    const prevBest=hist.reduce((best,wkSets)=>{
      const t=(wkSets||[]).filter(s=>!s.isWarmup&&!s.isBurnout).sort((a,b)=>parseFloat(b.w)-parseFloat(a.w))[0];
      const r=t?calc1RM(t.w,t.r):0;return r>best?r:best;
    },0);
    if(rm>prevBest&&prevBest>0)acc.push({name:ex.n,rm,prev:prevBest,gain:rm-prevBest});
    return acc;
  },[]);
  const doneCount=exercises.filter((_,i)=>!!data[`done_p${ph}_d${di}_e${i}`]).length;
  const nextDay=PHASES[ph].label+" "+(di<3?"Day "+(di+2):"— Rest then Day A");
  return(
    <div style={{position:"fixed",inset:0,zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.95)",padding:16}}>
      <div style={{width:"100%",maxWidth:400,background:C.card,borderRadius:16,padding:"24px 20px",border:`1px solid ${PHASES[ph].color}44`,maxHeight:"85vh",overflowY:"auto"}}>
        <div style={{textAlign:"center",marginBottom:20}}>
          <p style={{margin:"0 0 4px",fontSize:44,lineHeight:1}}>d</p>
          <p style={{margin:0,fontSize:30,fontFamily:FD,color:PHASES[ph].color,letterSpacing:"0.1em"}}>SESSION COMPLETE</p>

const LoginScreen = ({onLogin}) => {

    const newPin = pin + digit;
    setPin(newPin);
    setError("");
    if (newPin.length === 4) {
      setTimeout(() => {
        if (USERS[newPin]) {
          onLogin(newPin);

          setError("Wrong PIN. Try again.");
          setPin("");

    }
  };

    <div style={{background:C.bg,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,maxWidth:430,margin:"0 auto"}}>

                      {m.chest&&<span style={{fontSize:11,fontFamily:FC,color:C.text}}>Chest: <span style={{color:C.yellow,fontWeight:"bold"}}>{m.chest}"</span></span>}

            {/* PR board */}

              {WO[ph].map((day,di2)=>
                day.ex.filter(ex=>isCompound(ex.n)&&!ex.nw).map((ex,ei)=>{

                    const top=(sets||[]).filter(s=>!s.isWarmup&&!s.isBurnout&&s.w&&s.r).sort((a,b)=>parseFloat(b.w)-parseFloat(a.w))[0];

                    return rm>best.rm?{rm,w:top?.w,r:top?.r}:best;

                    <span style={{fontSize:12,fontFamily:FC}}><span style={{color:C.steel}}>{l.current}</span><span style={{color:C.muted}}> -> </span><span style={{color:C.yellow}}>{l.target}</span></span>

            </div>

            {/* Scan history */}

              <div style={{background:C.card,borderRadius:12,padding:"14px 16px",marginBottom:12,border:`1px solid ${C.border}`}}>

                <div style={{background:C.surface,borderRadius:8,padding:"8px 0",border:`1px solid ${C.border}`}}>

                      <span style={{flex:1,fontSize:12,fontWeight:"bold",color:C.yellow,fontFamily:FC}}>{s.w||"-"}</span>
                      <span style={{flex:1,fontSize:12,fontWeight:"bold",color:C.red,fontFamily:FC}}>{s.bf||"-"}%</span>
                      <span style={{flex:1,fontSize:12,fontWeight:"bold",color:C.green,fontFamily:FC}}>{s.m||"-"}</span>

            {/* BF journey */}
            <div style={{background:C.card,borderRadius:12,padding:"14px 16px",marginBottom:8,border:`1px solid ${C.border}`}}>
              <p style={{margin:"0 0 12px",fontSize:16,fontFamily:FD}}>BF% Journey</p>
              {[{l:"Start",v:11.6,c:C.red},{l:"Phase 1 end",v:10.5,c:C.yellow},{l:"Phase 2 end",v:9.5,c:C.yellow},{l:"Summer goal",v:8.5,c:C.green}].map((p,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                  <span style={{fontSize:11,color:C.muted,minWidth:90,fontFamily:FC}}>{p.l}</span>
                  <div style={{flex:1,background:C.border,borderRadius:3,height:6}}>
                    <div style={{background:p.c,width:`${((p.v-8)/(12-8))*100}%`,height:"100%",borderRadius:3}}/>
                  </div>
                  <span style={{fontSize:12,fontWeight:"bold",color:p.c,minWidth:36,textAlign:"right",fontFamily:FC}}>{p.v}%</span>

              ))}
              <p style={{margin:"8px 0 0",fontSize:11,color:C.muted,fontFamily:FB}}>Current: <span style={{color:C.yellow,fontWeight:"bold"}}>{curBF.toFixed(1)}%</span> — {(curBF-8.5).toFixed(1)}% to go</p>
            </div>
          </div>
        )}

        {/* ══ REHAB TAB ════════════════════════════════════════════════════ */}
        {tab==="mobility"&&(
          <div>
            <div style={{background:C.card,borderRadius:12,padding:"14px 16px",marginBottom:14,border:`1px solid ${C.yellow}33`}}>
              <p style={{margin:"0 0 6px",fontSize:18,fontFamily:FD,color:C.yellow}}>THE CHAIN REACTION</p>
              <p style={{margin:0,fontSize:12,color:C.muted,lineHeight:1.7,fontFamily:FB}}>
                <span style={{color:C.yellow}}>Tight feet/ankles</span> - restrict hips - anterior pelvic tilt - stress lumbar - limit thoracic - restrict shoulders - stress AC joint. Fix from the ground up. 10 min daily.
              </p>
            </div>
            {MOB.map((m,i)=>(
              <div key={i} style={{background:C.card,borderRadius:12,padding:"14px 16px",marginBottom:8,border:`1px solid ${C.border}`}}>

                  <div style={{display:"flex",gap:6}}>
                    <span style={{fontSize:9,padding:"2px 7px",borderRadius:4,background:m.pri==="CRITICAL"?C.red+"33":m.pri==="HIGH"?C.yellow+"22":C.border,color:m.pri==="CRITICAL"?C.red:m.pri==="HIGH"?C.yellow:C.muted,fontFamily:FC}}>{m.pri}</span>
                    <span style={{fontSize:9,padding:"2px 7px",borderRadius:4,background:C.surface,color:C.steel,fontFamily:FC}}>{m.time}</span>
                  </div>
                </div>
                <p style={{margin:0,fontSize:12,color:C.muted,lineHeight:1.6,fontFamily:FB}}>{m.body}</p>
              </div>
            ))}
            <div style={{background:C.card,borderRadius:12,padding:"14px 16px",border:`1px solid ${C.border}`,marginBottom:8}}>
              <p style={{margin:"0 0 10px",fontSize:14,fontFamily:FC,fontWeight:700,color:C.red}}>NEVER DO (AC Joint)</p>
              {["Behind-the-neck press or pulldown","Wide-grip upright rows","Max weight barbell flat bench - use DBs","Sleeping on your right shoulder"].map((r,i)=>(
                <p key={i} style={{margin:"0 0 6px",fontSize:12,color:C.muted,fontFamily:FB}}><span style={{color:C.red}}>X </span>{r}</p>
              ))}
            </div>
          </div>
        )}

      </div>{/* end padding div */}

      {/* ── BOTTOM NAV ────────────────────────────────────────────────────── */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:C.surface,borderTop:`1px solid ${C.border}`,display:"flex",paddingBottom:18}}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setTab(n.id)} style={{flex:1,background:"none",border:"none",padding:"11px 4px 2px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
            <Ic n={n.ic} sz={22} col={tab===n.id?pc:C.dim}/>
            <span style={{fontSize:8,color:tab===n.id?pc:C.dim,letterSpacing:"0.15em",textTransform:"uppercase",fontFamily:FC}}>{n.lb}</span>
          </button>
        ))}
      </div>

      {/* ── MODALS ────────────────────────────────────────────────────────── */}
      {lm!==null&&(
        <LogModal
          ex={wo.ex[lm]}
          pc={pc}
          lastSets={data[`p${ph}_d${di}_e${lm}`]}
          targets={getTargets(lm)}
          week={currentWeek}
          phase={ph}
          allHistory={getHistory(lm)}
          onSave={(sets,note)=>saveLog(lm,sets,note)}
          onClose={()=>setLm(null)}
        />
      )}
      {timerOpen&&<RestTimer onClose={()=>setTimerOpen(false)}/>}
      {sessionDone&&(
        <SessionComplete
          wo={wo} data={data} ph={ph} di={di} week={currentWeek}
          onClose={()=>setSessionDone(false)}
        />
      )}
    </div>
  );
}

function App(){
  const [activeUser,setActiveUser_] = useState(getActiveUser);
  const pin = activeUser?.pin;
  const user = pin ? USERS[pin] : null;
  const handleLogin = (p) => { setActiveUser(p); setActiveUser_({pin:p,ts:Date.now()}); };
  const handleLogout = () => { clearActiveUser(); setActiveUser_(null); };
  if (!user) return <LoginScreen onLogin={handleLogin}/>;
  return <AppInner pin={pin} user={user} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>

  <script>
  // ── SERVICE WORKER + PWA ─────────────────────────────────────────────────
  const VAPID_PUBLIC_KEY = 'YOUR_VAPID_PUBLIC_KEY';
  function urlBase64ToUint8Array(b64){
    const pad='='.repeat((4-b64.length%4)%4);
    const b=(b64+pad).replace(/-/g,'+').replace(/_/g,'/');
    const raw=window.atob(b);
    return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));
  }
  async function registerSW(){
    if(!('serviceWorker' in navigator))return;
    try{
      const reg=await navigator.serviceWorker.register('/sw.js');
      const perm=await Notification.requestPermission();
      if(perm!=='granted')return;
      let sub=await reg.pushManager.getSubscription();
      if(!sub){sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlBase64ToUint8Array(VAPID_PUBLIC_KEY)});}
      await fetch('/api/subscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({subscription:sub})});
    }catch(e){console.log('SW:',e);}
  }
  window.addEventListener('load',registerSW);
  </script>
